<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">Кто хорошо и кто плохо запоминает сны</title>
  <desc id="desc">Схематичное сравнение двух мозгов: у хорошо запоминающих сны выше активность в височно-теменном узле и медиальной префронтальной коре.</desc>

  <rect fill="#f7f6fb" x="0" y="0" width="720" height="440" rx="12"/>

  <text fill="#1a1a2e" x="48" y="46" font-size="20" font-weight="700">Две области мозга активнее у тех, кто помнит сны</text>
  <text fill="#6b7280" x="48" y="70" font-size="13">Схема — области приблизительны, по Eichenlaub &amp; Ruby et al., 2014</text>

  <!-- ===== LEFT: HIGH ===== -->
  <g transform="translate(70,116)">
    <text fill="#1a1a2e" x="120" y="0" font-size="15" font-weight="700" text-anchor="middle">Хорошо запоминают</text>
    <text fill="#6b7280" x="120" y="20" font-size="12.5" text-anchor="middle">≈5 снов в неделю</text>
    <path fill="#f0e6fb" stroke="#d9bff2" stroke-width="1.5"
          d="M44,120 C24,116 20,94 34,82 C26,62 44,42 70,42 C86,26 118,24 138,36 C168,30 194,48 198,72 C214,82 214,106 196,114 C198,132 180,144 162,140 C154,150 136,150 128,142 C112,150 92,148 82,136 C64,144 46,136 44,120 Z"/>
    <path fill="none" stroke="#d9bff2" stroke-width="1.5" d="M46,120 C58,110 74,110 86,122"/>
    <path fill="none" stroke="#d9bff2" stroke-width="1.5" d="M62,140 L60,160"/>
    <circle fill="#9900FF" cx="60" cy="90" r="16"/>
    <circle fill="#CE09D2" cx="176" cy="94" r="16"/>
  </g>

  <!-- ===== RIGHT: LOW ===== -->
  <g transform="translate(410,116)">
    <text fill="#1a1a2e" x="120" y="0" font-size="15" font-weight="700" text-anchor="middle">Плохо запоминают</text>
    <text fill="#6b7280" x="120" y="20" font-size="12.5" text-anchor="middle">≈2 сна в месяц</text>
    <path fill="#efeaf3" stroke="#ddd3e8" stroke-width="1.5"
          d="M44,120 C24,116 20,94 34,82 C26,62 44,42 70,42 C86,26 118,24 138,36 C168,30 194,48 198,72 C214,82 214,106 196,114 C198,132 180,144 162,140 C154,150 136,150 128,142 C112,150 92,148 82,136 C64,144 46,136 44,120 Z"/>
    <path fill="none" stroke="#ddd3e8" stroke-width="1.5" d="M46,120 C58,110 74,110 86,122"/>
    <path fill="none" stroke="#ddd3e8" stroke-width="1.5" d="M62,140 L60,160"/>
    <circle fill="#9900FF" opacity="0.25" cx="60" cy="90" r="16"/>
    <circle fill="#CE09D2" opacity="0.25" cx="176" cy="94" r="16"/>
  </g>

  <!-- ===== LEGEND ===== -->
  <circle fill="#9900FF" cx="102" cy="392" r="9"/>
  <text fill="#1a1a2e" x="120" y="389" font-size="13" font-weight="700">mPFC</text>
  <text fill="#374151" x="120" y="406" font-size="12">медиальная префронтальная кора</text>

  <circle fill="#CE09D2" cx="402" cy="392" r="9"/>
  <text fill="#1a1a2e" x="420" y="389" font-size="13" font-weight="700">TPJ</text>
  <text fill="#374151" x="420" y="406" font-size="12">височно-теменной узел</text>
</svg>
