<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">Как быстро сон забывается после пробуждения</title>
  <desc id="desc">Иллюстративная кривая: объём сна, который удаётся вспомнить, резко падает в первые минуты после пробуждения и почти сходит к нулю.</desc>

  <rect fill="#f7f6fb" x="0" y="0" width="720" height="440" rx="12"/>

  <text fill="#1a1a2e" x="48" y="46" font-size="21" font-weight="700">Как быстро сон забывается после пробуждения</text>
  <text fill="#6b7280" x="48" y="70" font-size="13">Иллюстрация — характер спада, а не измеренные данные</text>

  <!-- Gridlines -->
  <line stroke="#e5e7eb" stroke-width="1" x1="90" y1="110" x2="672" y2="110"/>
  <line stroke="#e5e7eb" stroke-width="1" x1="90" y1="165" x2="672" y2="165"/>
  <line stroke="#e5e7eb" stroke-width="1" x1="90" y1="220" x2="672" y2="220"/>
  <line stroke="#e5e7eb" stroke-width="1" x1="90" y1="275" x2="672" y2="275"/>

  <!-- Axes -->
  <line stroke="#9ca3af" stroke-width="1.5" x1="90" y1="110" x2="90" y2="330"/>
  <line stroke="#9ca3af" stroke-width="1.5" x1="90" y1="330" x2="672" y2="330"/>

  <!-- Curve -->
  <path fill="#9900FF" opacity="0.10" d="M90,132 C150,140 200,190 270,255 C340,316 470,326 672,328 L672,330 L90,330 Z"/>
  <path fill="none" stroke="#9900FF" stroke-width="3.5" stroke-linecap="round" d="M90,132 C150,140 200,190 270,255 C340,316 470,326 672,328"/>

  <!-- Numbered markers -->
  <circle fill="#9900FF" cx="90"  cy="132" r="11"/>
  <text fill="#ffffff" x="90"  y="137" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <circle fill="#9900FF" cx="270" cy="255" r="11"/>
  <text fill="#ffffff" x="270" y="260" font-size="13" font-weight="700" text-anchor="middle">2</text>

  <!-- Axis labels -->
  <text fill="#6b7280" x="20" y="224" font-size="12" font-weight="600" transform="rotate(-90 20 224)" text-anchor="middle">Сколько удаётся вспомнить</text>
  <text fill="#6b7280" x="90"  y="352" font-size="12" text-anchor="middle">Пробуждение</text>
  <text fill="#6b7280" x="381" y="352" font-size="12" text-anchor="middle">Минуты после пробуждения →</text>
  <text fill="#6b7280" x="672" y="352" font-size="12" text-anchor="end">Встали с кровати</text>

  <!-- Legend -->
  <circle fill="#9900FF" cx="102" cy="392" r="9"/>
  <text fill="#ffffff" x="102" y="396" font-size="11" font-weight="700" text-anchor="middle">1</text>
  <text fill="#1a1a2e" x="120" y="389" font-size="13" font-weight="700">В момент пробуждения</text>
  <text fill="#374151" x="120" y="406" font-size="12.5">сон помнится почти весь</text>

  <circle fill="#9900FF" cx="402" cy="392" r="9"/>
  <text fill="#ffffff" x="402" y="396" font-size="11" font-weight="700" text-anchor="middle">2</text>
  <text fill="#1a1a2e" x="420" y="389" font-size="13" font-weight="700">Через несколько минут</text>
  <text fill="#374151" x="420" y="406" font-size="12.5">почти всё уже забыто</text>
</svg>
