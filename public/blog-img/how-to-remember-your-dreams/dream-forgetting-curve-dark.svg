<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">How dream recall fades after waking</title>
  <desc id="desc">An illustrative curve showing that the amount of a dream you can remember drops sharply in the first few minutes after waking, then flattens near zero.</desc>

  <rect fill="#030303" x="0" y="0" width="720" height="440" rx="12"/>

  <text fill="#f3f4f6" x="48" y="46" font-size="21" font-weight="700">How quickly a dream fades after you wake</text>
  <text fill="#9ca3af" x="48" y="70" font-size="13">Illustrative — the shape of the decline, not measured data</text>

  <!-- Gridlines -->
  <line stroke="#2a2a3a" stroke-width="1" x1="90" y1="110" x2="672" y2="110"/>
  <line stroke="#2a2a3a" stroke-width="1" x1="90" y1="165" x2="672" y2="165"/>
  <line stroke="#2a2a3a" stroke-width="1" x1="90" y1="220" x2="672" y2="220"/>
  <line stroke="#2a2a3a" stroke-width="1" x1="90" y1="275" x2="672" y2="275"/>

  <!-- Axes -->
  <line stroke="#4b5563" stroke-width="1.5" x1="90" y1="110" x2="90" y2="330"/>
  <line stroke="#4b5563" stroke-width="1.5" x1="90" y1="330" x2="672" y2="330"/>

  <!-- Curve -->
  <path fill="#CE09D2" opacity="0.12" d="M90,132 C150,140 200,190 270,255 C340,316 470,326 672,328 L672,330 L90,330 Z"/>
  <path fill="none" stroke="#CE09D2" stroke-width="3.5" stroke-linecap="round" d="M90,132 C150,140 200,190 270,255 C340,316 470,326 672,328"/>

  <!-- Numbered markers (no text over the plot) -->
  <circle fill="#CE09D2" cx="90"  cy="132" r="11"/>
  <text fill="#030303" x="90"  y="137" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <circle fill="#CE09D2" cx="270" cy="255" r="11"/>
  <text fill="#030303" x="270" y="260" font-size="13" font-weight="700" text-anchor="middle">2</text>

  <!-- Axis labels -->
  <text fill="#9ca3af" x="20" y="224" font-size="12" font-weight="600" transform="rotate(-90 20 224)" text-anchor="middle">How much you can recall</text>
  <text fill="#9ca3af" x="90"  y="352" font-size="12" text-anchor="middle">Waking</text>
  <text fill="#9ca3af" x="381" y="352" font-size="12" text-anchor="middle">Minutes awake →</text>
  <text fill="#9ca3af" x="672" y="352" font-size="12" text-anchor="end">Out of bed</text>

  <!-- Legend below the plot -->
  <circle fill="#CE09D2" cx="102" cy="392" r="9"/>
  <text fill="#030303" x="102" y="396" font-size="11" font-weight="700" text-anchor="middle">1</text>
  <text fill="#f3f4f6" x="120" y="389" font-size="13" font-weight="700">The moment you wake</text>
  <text fill="#d1d5db" x="120" y="406" font-size="12.5">most of the dream is still there</text>

  <circle fill="#CE09D2" cx="402" cy="392" r="9"/>
  <text fill="#030303" x="402" y="396" font-size="11" font-weight="700" text-anchor="middle">2</text>
  <text fill="#f3f4f6" x="420" y="389" font-size="13" font-weight="700">A few minutes later</text>
  <text fill="#d1d5db" x="420" y="406" font-size="12.5">most of it is already gone</text>
</svg>
