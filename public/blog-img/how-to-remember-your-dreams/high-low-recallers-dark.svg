<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">High recallers versus low recallers</title>
  <desc id="desc">A schematic comparison of two brains: high dream recallers show more activity in the temporoparietal junction and medial prefrontal cortex than low recallers.</desc>

  <rect fill="#030303" x="0" y="0" width="720" height="440" rx="12"/>

  <text fill="#f3f4f6" x="48" y="46" font-size="21" font-weight="700">Two brain regions are more active in high recallers</text>
  <text fill="#9ca3af" x="48" y="70" font-size="13">Schematic — regions are approximate, based on Eichenlaub &amp; Ruby et al., 2014</text>

  <!-- ===== LEFT BRAIN: HIGH RECALLERS ===== -->
  <g transform="translate(70,116)">
    <text fill="#f3f4f6" x="120" y="0" font-size="15" font-weight="700" text-anchor="middle">High recallers</text>
    <text fill="#9ca3af" x="120" y="20" font-size="12.5" text-anchor="middle">~5 dreams a week</text>
    <path fill="#241033" stroke="#4a2b63" stroke-width="1.5"
          d="M44,120 C24,116 20,94 34,82 C26,62 44,42 70,42 C86,26 118,24 138,36 C168,30 194,48 198,72 C214,82 214,106 196,114 C198,132 180,144 162,140 C154,150 136,150 128,142 C112,150 92,148 82,136 C64,144 46,136 44,120 Z"/>
    <path fill="none" stroke="#4a2b63" stroke-width="1.5" d="M46,120 C58,110 74,110 86,122"/>
    <path fill="none" stroke="#4a2b63" stroke-width="1.5" d="M62,140 L60,160"/>
    <circle fill="#b44dff" cx="60" cy="90" r="16"/>
    <circle fill="#e33fe6" cx="176" cy="94" r="16"/>
  </g>

  <!-- ===== RIGHT BRAIN: LOW RECALLERS ===== -->
  <g transform="translate(410,116)">
    <text fill="#f3f4f6" x="120" y="0" font-size="15" font-weight="700" text-anchor="middle">Low recallers</text>
    <text fill="#9ca3af" x="120" y="20" font-size="12.5" text-anchor="middle">~2 dreams a month</text>
    <path fill="#1b1b24" stroke="#333340" stroke-width="1.5"
          d="M44,120 C24,116 20,94 34,82 C26,62 44,42 70,42 C86,26 118,24 138,36 C168,30 194,48 198,72 C214,82 214,106 196,114 C198,132 180,144 162,140 C154,150 136,150 128,142 C112,150 92,148 82,136 C64,144 46,136 44,120 Z"/>
    <path fill="none" stroke="#333340" stroke-width="1.5" d="M46,120 C58,110 74,110 86,122"/>
    <path fill="none" stroke="#333340" stroke-width="1.5" d="M62,140 L60,160"/>
    <circle fill="#b44dff" opacity="0.3" cx="60" cy="90" r="16"/>
    <circle fill="#e33fe6" opacity="0.3" cx="176" cy="94" r="16"/>
  </g>

  <!-- ===== LEGEND ===== -->
  <circle fill="#b44dff" cx="102" cy="392" r="9"/>
  <text fill="#f3f4f6" x="120" y="389" font-size="13" font-weight="700">mPFC</text>
  <text fill="#d1d5db" x="120" y="406" font-size="12.5">medial prefrontal cortex</text>

  <circle fill="#e33fe6" cx="402" cy="392" r="9"/>
  <text fill="#f3f4f6" x="420" y="389" font-size="13" font-weight="700">TPJ</text>
  <text fill="#d1d5db" x="420" y="406" font-size="12.5">temporoparietal junction</text>
</svg>
