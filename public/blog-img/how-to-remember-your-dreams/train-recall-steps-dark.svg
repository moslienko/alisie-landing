<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">Three steps to train dream recall</title>
  <desc id="desc">A three-step routine: set the intention before sleep, stay still on waking, and write the dream down immediately.</desc>

  <defs>
    <linearGradient id="tint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9900FF"/>
      <stop offset="1" stop-color="#CE09D2"/>
    </linearGradient>
    <mask id="moon">
      <circle cx="0" cy="0" r="14" fill="#fff"/>
      <circle cx="6" cy="-4" r="12" fill="#000"/>
    </mask>
  </defs>

  <rect fill="#030303" x="0" y="0" width="720" height="300" rx="12"/>

  <text fill="#f3f4f6" x="48" y="46" font-size="21" font-weight="700">Three steps that train dream recall</text>
  <text fill="#9ca3af" x="48" y="70" font-size="13">A simple routine — most people notice a difference within about a month</text>

  <line stroke="#3a2650" stroke-width="2" x1="150" y1="150" x2="570" y2="150"/>

  <!-- STEP 1 — crescent moon -->
  <g transform="translate(150,150)">
    <circle fill="url(#tint)" r="34"/>
    <rect x="-16" y="-16" width="32" height="32" fill="#ffffff" mask="url(#moon)"/>
    <text fill="#f3f4f6" x="0" y="66" font-size="14.5" font-weight="700" text-anchor="middle">Set the intention</text>
    <text fill="#9ca3af" x="0" y="87" font-size="12.5" text-anchor="middle">before you fall asleep,</text>
    <text fill="#9ca3af" x="0" y="104" font-size="12.5" text-anchor="middle">decide you'll remember</text>
  </g>

  <!-- STEP 2 — closed eye -->
  <g transform="translate(360,150)">
    <circle fill="url(#tint)" r="34"/>
    <path fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" d="M-15,0 C-9,9 9,9 15,0"/>
    <line stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" x1="-13" y1="5" x2="-16" y2="9"/>
    <line stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" x1="0" y1="7" x2="0" y2="12"/>
    <line stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" x1="13" y1="5" x2="16" y2="9"/>
    <text fill="#f3f4f6" x="0" y="66" font-size="14.5" font-weight="700" text-anchor="middle">Stay still on waking</text>
    <text fill="#9ca3af" x="0" y="87" font-size="12.5" text-anchor="middle">eyes closed, don't move</text>
    <text fill="#9ca3af" x="0" y="104" font-size="12.5" text-anchor="middle">for a few seconds</text>
  </g>

  <!-- STEP 3 — pencil -->
  <g transform="translate(570,150)">
    <circle fill="url(#tint)" r="34"/>
    <g stroke="#ffffff" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" fill="none">
      <path d="M-13,13 L-13,7 L5,-11 L11,-5 L-7,13 Z"/>
      <line x1="1" y1="-7" x2="7" y2="-1"/>
      <line x1="-13" y1="13" x2="-7" y2="13"/>
    </g>
    <text fill="#f3f4f6" x="0" y="66" font-size="14.5" font-weight="700" text-anchor="middle">Write it down</text>
    <text fill="#9ca3af" x="0" y="87" font-size="12.5" text-anchor="middle">even one image, right</text>
    <text fill="#9ca3af" x="0" y="104" font-size="12.5" text-anchor="middle">away, before you get up</text>
  </g>
</svg>
